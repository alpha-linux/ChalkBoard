<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="author" content="Ishan Banerjee" />
    <meta name="description" content="ChalkBoard sketch page" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChalkBoard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.11/paper-full.min.js"></script>
    <script type="text/javascript" src="offset.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="chalkdraw.js"></script>
    <script src="screenanimation.js"></script>
    <script src="commandline.js"></script>
    <link rel="stylesheet" href="chalkboardstyle.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <canvas id="sketcharea" resize> </canvas>
    <div id="toolbar">
      <button id="pentool1" class="tool"></button>
      <button id="pentool2" class="tool"></button>

      <button id="pentool3" class="tool"></button>

      <button id="pentool4" class="tool"></button>

      <button id="pentool5" class="tool"></button>

      <button id="erasertool" class="tool"></button>

      <button id="lasertool" class="tool"></button>
    </div>
    <div id="footer">
      <form id="clicontainer" onkeydown="return event.key != 'Enter';">
        <input type="text" id="cli" spellcheck="false" autocomplete="off" />
      </form>
    </div>
  </body>
</html>
